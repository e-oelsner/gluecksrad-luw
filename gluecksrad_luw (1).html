
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glücksrad – LUW Team</title>
  <style>
    :root {
      --accent: #2563eb;
      --bg: #0b1020;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      background: radial-gradient(1200px 600px at 50% -100px, #1f2937 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(1100px, 96vw);
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      align-items: center;
    }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
    }
    .card {
      background: linear-gradient(180deg, #0f172a 0%, #0b1223 100%);
      border: 1px solid #0b2244;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      padding: 16px;
    }
    h1 {
      margin: 0 0 6px;
      font-weight: 700;
      font-size: clamp(22px, 3vw, 28px);
    }
    p.sub { margin: 0 0 12px; color: var(--muted); }

    /* Wheel area */
    .stage { position: relative; }
    canvas { width: 100%; height: auto; display: block; }
    .pointer {
      position: absolute; inset: 0; pointer-events: none; display: grid; place-items: center;
    }
    .pointer:after {
      content: ""; width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent;
      border-bottom: 26px solid #f59e0b; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5)); transform: translateY(-8px);
    }

    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; }
    button, select {
      background: #0f172a; color: var(--text); border: 1px solid #1f3b70; border-radius: 10px; padding: 10px 14px; cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: #1e40af; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .result { margin-top: 8px; font-weight: 600; font-size: 18px; min-height: 26px; }

    .list { max-height: 420px; overflow: auto; margin-top: 8px; padding-right: 6px; }
    .item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px dashed #20335533; }
    .item:last-child { border-bottom: 0; }
    .badge {
      font-size: 12px; color: #93c5fd; background: #0b2448; border: 1px solid #1e40af; padding: 2px 8px; border-radius: 999px;
    }
    input[type=checkbox] { accent-color: #60a5fa; width: 16px; height: 16px; }
    .footer { color: var(--muted); font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Glücksrad – LUW Team</h1>
      <p class="sub">Wähle die Namen aus, drücke <strong>Drehen</strong> und lasse das Rad entscheiden. Du kannst bereits Gewählte automatisch ausschließen.</p>
      <div class="stage">
        <canvas id="wheel" width="750" height="750"></canvas>
        <div class="pointer"></div>
      </div>
      <div class="controls">
        <button id="spinBtn" class="primary">🎯 Drehen</button>
        <button id="resetBtn">🔁 Zurücksetzen</button>
        <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="excludeWinners" checked> Gewinner ausschließen</label>
        <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="tickSound" checked> Tick-Sound</label>
        <select id="duration">
          <option value="4">Dauer: 4s</option>
          <option value="6" selected>Dauer: 6s</option>
          <option value="8">Dauer: 8s</option>
        </select>
      </div>
      <div id="result" class="result"></div>
      <div class="footer">Tipp: Du kannst während des Laufens erneut klicken, um frühzeitig zu stoppen.</div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <h2 style="margin:0">Teilnehmer</h2>
        <span class="badge" id="badgeCount"></span>
      </div>
      <div class="list" id="list"></div>
    </div>
  </div>

  <audio id="tick" preload="auto">
    <source src="data:audio/mp3;base64,//uQZAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCAAAACAAACcQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" type="audio/mpeg" />
  </audio>

  <script>
    const initialNames = ["Anna Eisenschmidt", "Anna Hardekopf", "Anne-Marie Kokott", "Can Deveci", "Carolin Bellmann", "Emilia Oelsner", "Janine Borrmann", "Julia Malik", "Kaan Cihan", "Katharina Hämmerli", "Karolina Mikolajczyk", "Konstantin Oliver Schmidt", "Lara Limbach", "Lisa Freund", "Mandy Thierbach", "Marie Scholl", "Marta Adela Slowik", "Michael Fratscher", "Nicolai Dietrich", "Pawel Liszewski", "Rabia Özkulluk", "Sabine Lehmann", "Sarah Rauscher", "Sebastian Indrunas", "Simon Westerfeld", "Susann Jacobs", "Tristan Hoigt"];
    // State
    let entries = initialNames.map(n => ({ name: n, enabled: true }));
    let spinning = false;
    let angle = 0; // current angle (radians)
    let velocity = 0; // angular velocity (rad/s)
    let lastTickIndex = -1; // for tick sound

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultEl = document.getElementById('result');
    const listEl = document.getElementById('list');
    const badgeCount = document.getElementById('badgeCount');
    const excludeWinners = document.getElementById('excludeWinners');
    const tickAudio = document.getElementById('tick');
    const tickSound = document.getElementById('tickSound');
    const durationSel = document.getElementById('duration');

    function colors(i, total) {
      const hue = (i / total) * 360;
      return `hsl(${hue}, 70%, 55%)`;
    }

    function drawWheel() {
      const active = entries.filter(e => e.enabled);
      const count = Math.max(active.length, 1);
      const cx = canvas.width/2, cy = canvas.height/2, r = Math.min(cx, cy) - 10;

      ctx.clearRect(0,0,canvas.width, canvas.height);

      // Outer ring shadow
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);

      const slice = (Math.PI * 2) / count;
      active.forEach((e, i) => {
        // Slice
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0,0,r, i*slice, (i+1)*slice);
        ctx.closePath();
        ctx.fillStyle = colors(i, count);
        ctx.fill();

        // Separator
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 2;
        ctx.stroke();
      });

      // Labels
      ctx.fillStyle = '#0b1020';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 18px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
      active.forEach((e, i) => {
        const theta = i*slice + slice/2;
        ctx.save();
        ctx.rotate(theta);
        ctx.translate(r*0.62, 0);
        wrapText(ctx, e.name, 140, 20);
        ctx.restore();
      });

      // Center hub
      ctx.beginPath();
      ctx.arc(0,0, r*0.08, 0, Math.PI*2);
      ctx.fillStyle = '#111827';
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#1f3b70';
      ctx.stroke();

      ctx.restore();

      // Rim
      ctx.beginPath();
      ctx.arc(cx, cy, r+2, 0, Math.PI*2);
      ctx.lineWidth = 6;
      ctx.strokeStyle = '#1f3b70';
      ctx.stroke();
    }

    function wrapText(ctx, text, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '';
      let y = 0;
      const lines = [];
      for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let { width } = ctx.measureText(testLine);
        if (width > maxWidth && n > 0) {
          lines.push(line.trim());
          line = words[n] + ' ';
        } else {
          line = testLine;
        }
      }
      lines.push(line.trim());
      const totalHeight = (lines.length - 1) * lineHeight;
      y = -totalHeight / 2;
      for (const ln of lines) {
        ctx.fillText(ln, 0, y);
        y += lineHeight;
      }
    }

    function updateList() {
      listEl.innerHTML = '';
      const activeCount = entries.filter(e => e.enabled).length;
      badgeCount.textContent = `${activeCount} aktiv / ${entries.length} gesamt`;
      entries.forEach((e, idx) => {
        const row = document.createElement('div');
        row.className = 'item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = e.enabled;
        cb.addEventListener('change', () => { e.enabled = cb.checked; drawWheel(); updateList(); });
        const label = document.createElement('label');
        label.textContent = e.name;
        label.style.flex = '1';
        row.appendChild(cb);
        row.appendChild(label);
        listEl.appendChild(row);
      });
    }

    function indexAtPointer() {
      const active = entries.filter(e => e.enabled);
      if (!active.length) return -1;
      const slice = (Math.PI * 2) / active.length;
      // Pointer is at 12 o'clock; account for rotation
      let a = (Math.PI * 1.5 - angle) % (Math.PI*2);
      if (a < 0) a += Math.PI*2;
      return Math.floor(a / slice);
    }

    function playTickIfNeeded() {
      if (!tickSound.checked) return;
      const active = entries.filter(e => e.enabled);
      if (!active.length) return;
      const idx = indexAtPointer();
      if (idx !== lastTickIndex) {
        lastTickIndex = idx;
        try {
          tickAudio.currentTime = 0;
          tickAudio.volume = 0.25;
          tickAudio.play();
        } catch(e) {}
      }
    }

    function animate() {
      if (!spinning) return;
      const now = performance.now();
      if (!animate.last) animate.last = now;
      const dt = (now - animate.last) / 1000; // seconds
      animate.last = now;

      // friction
      const friction = 0.985;
      velocity *= Math.pow(friction, (dt*60));
      angle += velocity * dt;

      drawWheel();
      playTickIfNeeded();

      if (velocity < 0.05) {
        spinning = false;
        velocity = 0;
        finalizeWinner();
        return;
      }
      requestAnimationFrame(animate);
    }

    function spin() {
      const active = entries.filter(e => e.enabled);
      if (spinning || active.length < 2) return;
      resultEl.textContent = '';
      lastTickIndex = -1;
      const dur = parseFloat(durationSel.value);
      // Choose random target slice and compute velocity accordingly
      const slice = (Math.PI * 2) / active.length;
      const targetIndex = Math.floor(Math.random() * active.length);
      const targetAngle = Math.PI * 1.5 - (targetIndex + 0.5) * slice; // center under pointer
      let delta = ((targetAngle - angle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
      // Add extra full rotations for drama
      const extra = (Math.PI*2) * 6; // 6 full spins
      const total = delta + extra;
      // Uniform deceleration: theta = 0.5 * a * t^2 + w0 * t; if final w=0, then w0 = a*t
      // Using w0 = 2*total / t
      const w0 = 2 * total / dur;
      velocity = w0; // we'll decay via friction until it ~stops near dur seconds
      spinning = true;
      animate.last = undefined;
      requestAnimationFrame(animate);
    }

    function finalizeWinner() {
      const active = entries.filter(e => e.enabled);
      if (!active.length) { resultEl.textContent = 'Keine aktiven Namen.'; return; }
      const idx = indexAtPointer();
      const slice = (Math.PI * 2) / active.length;
      // Snap angle so the chosen slice is perfectly aligned
      angle = Math.PI * 1.5 - (idx + 0.5) * slice;
      drawWheel();
      const winner = active[idx];
      resultEl.innerHTML = `Gewinner: <strong>${winner.name}</strong>`;
      if (excludeWinners.checked) {
        // Find in main list and disable
        const i = entries.findIndex(e => e.name === winner.name);
        if (i >= 0) entries[i].enabled = false;
        updateList();
      }
    }

    spinBtn.addEventListener('click', () => {
      if (spinning) { // early stop
        velocity = 0.04; // force finish
        return;
      }
      spin();
    });

    resetBtn.addEventListener('click', () => {
      entries.forEach(e => e.enabled = true);
      angle = 0; velocity = 0; spinning = false; resultEl.textContent='';
      updateList(); drawWheel();
    });

    // Init
    updateList();
    drawWheel();
    window.addEventListener('resize', drawWheel);
  </script>
</body>
</html>
